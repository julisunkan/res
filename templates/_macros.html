{% macro ad_slot(ads, placement_key, format='auto', extra_style='') %}
{% set pl = ads.get(placement_key, {}) %}
{% if ads.get('publisher_id') and pl.get('enabled') and pl.get('slot') %}
<div class="ad-slot ad-slot-{{ placement_key }}">
  <span class="ad-label">Advertisement</span>
  <ins class="adsbygoogle"
    style="display:block;{{ extra_style }}"
    data-ad-client="{{ ads.publisher_id }}"
    data-ad-slot="{{ pl.slot }}"
    data-ad-format="{{ format }}"
    data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{% endif %}
{% endmacro %}
