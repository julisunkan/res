<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-wrap {
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand-logo {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #5b50f0 0%, #a78bfa 100%);
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 22px; color: #fff;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(91,80,240,0.35);
        }
        h1 {
            font-size: 22px; font-weight: 700; color: #e2e8f0;
            margin-bottom: 5px;
        }
        .subtitle { color: #64748b; font-size: 13px; }
        .login-box {
            background: #13131f;
            border: 1px solid #1f1f38;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #94a3b8;
            margin-bottom: 7px;
        }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 11px 44px 11px 14px;
            background: #0a0a14;
            border: 1px solid #2a2a48;
            border-radius: 9px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { border-color: #5b50f0; box-shadow: 0 0 0 3px rgba(91,80,240,0.14); }
        .pw-wrap { position: relative; }
        .toggle-pw {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: #64748b; cursor: pointer;
            font-size: 14px; padding: 4px;
            transition: color 0.15s;
        }
        .toggle-pw:hover { color: #94a3b8; }
        .btn {
            width: 100%;
            padding: 12px;
            background: #5b50f0;
            color: white; border: none;
            border-radius: 9px;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            font-family: inherit;
            transition: background 0.2s, transform 0.15s, box-shadow 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: #3730a3; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(91,80,240,0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 14px;
            display: none;
            align-items: center; gap: 8px;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-header">
            <div class="brand-logo"><i class="fa-solid fa-shield-halved"></i></div>
            <h1>Admin Access</h1>
            <p class="subtitle">Restricted area — authorised personnel only</p>
        </div>
        <div class="login-box">
            <form onsubmit="event.preventDefault(); login();">
                <label for="password">Password</label>
                <div class="pw-wrap">
                    <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password">
                    <button class="toggle-pw" type="button" onclick="togglePw()"><i class="fa-regular fa-eye" id="eyeIcon"></i></button>
                </div>
                <button class="btn" id="loginBtn" type="submit">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Enter Panel
                </button>
            </form>
            <div class="error" id="errorMsg"><i class="fa-solid fa-circle-exclamation"></i> <span id="errorText"></span></div>
        </div>
    </div>
    <script>
        function togglePw() {
            const inp = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                inp.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        }
        async function login() {
            const pw = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            if (!pw) return;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Checking…';
            err.style.display = 'none';
            try {
                const res = await fetch('/julisunkan/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ password: pw })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/julisunkan/dashboard';
                } else {
                    document.getElementById('errorText').textContent = data.error || 'Incorrect password';
                    err.style.display = 'flex';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Enter Panel';
                }
            } catch(e) {
                document.getElementById('errorText').textContent = 'Connection error. Try again.';
                err.style.display = 'flex';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Enter Panel';
            }
        }
    </script>
</body>
</html>
